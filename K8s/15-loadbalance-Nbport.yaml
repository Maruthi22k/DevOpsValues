apiVersion: v1
kind: Service
metadata:
  name: service-loadbalance

  ## selector is used to select the pods which are going to be part of this service
  ## based on this selector service will route the traffic to the pods which are selected by this selector
spec:
  type: loadBalancer    ## this is used to expose the service to the outside world, so that we can access the service from outside of the cluster
  selector:
    project: JCS-Global-service
    user: maruthi
    role: project-lead
    purpose: load-balance  ## this is used to identify the purpose of this service, so that we can easily identify the service which is used for load-balance
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30080  ## this is used to specify the port on which the service is exposed to the outside world, 
                       ## so that we can access the service from outside of the cluster using this port
      